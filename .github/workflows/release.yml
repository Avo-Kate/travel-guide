name: Release

# Publish a GitHub Release whenever a version tag is pushed, e.g.
#   git tag -a v0.3.0 -m "Phase 3: polish" && git push origin v0.3.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff prior tags
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
